# TEMPORARY bootstrap vhost for craftyap.com — HTTP only, no TLS.
# Purpose: claim craftyap.com on port 80 BEFORE a cert exists, so (a) requests
# stop falling through to the pokemon default vhost, and (b) certbot's HTTP-01
# challenge is served from the craftyap webroot. Swap in craftyap.com.conf
# (the real TLS vhost) right after the cert is issued.
#
#   sudo mkdir -p /var/www/craftyap
#   sudo cp /srv/craftyap/app/ops/nginx/craftyap.com.bootstrap.conf \
#           /etc/nginx/sites-available/craftyap.com.conf
#   sudo ln -sf /etc/nginx/sites-available/craftyap.com.conf /etc/nginx/sites-enabled/
#   sudo nginx -t && sudo systemctl reload nginx

server {
    listen 80;
    listen [::]:80;
    server_name craftyap.com www.craftyap.com;

    # ACME HTTP-01 challenge (certbot --webroot -w /var/www/craftyap)
    location ^~ /.well-known/acme-challenge/ {
        root /var/www/craftyap;
    }

    # Meanwhile the game is already reachable over plain HTTP (incl. /ws).
    location / {
        proxy_pass http://127.0.0.1:8082;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 300s;
    }
}
