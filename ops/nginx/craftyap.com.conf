# Production vhost for craftyap.com — reverse-proxies to the CraftYap container
# (docker compose, 127.0.0.1:8082). Runs alongside pokemondive.com on the same
# nginx. Apply on the server:
#   sudo cp /srv/craftyap/app/ops/nginx/craftyap.com.conf /etc/nginx/sites-available/craftyap.com.conf
#   sudo ln -s /etc/nginx/sites-available/craftyap.com.conf /etc/nginx/sites-enabled/
#   # first time only — get the TLS cert (writes the /etc/letsencrypt paths below):
#   sudo certbot --nginx -d craftyap.com -d www.craftyap.com
#   sudo nginx -t && sudo systemctl reload nginx

# Port 80: answer ACME challenges, redirect everything else to https apex.
server {
    listen 80;
    listen [::]:80;
    server_name craftyap.com www.craftyap.com;

    access_log /srv/craftyap/logs/nginx-access.log;
    error_log /srv/craftyap/logs/nginx-error.log;

    location ^~ /.well-known/acme-challenge/ {
        root /var/www/craftyap;
    }

    location / {
        return 301 https://craftyap.com$request_uri;
    }
}

server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;
    server_name craftyap.com www.craftyap.com;

    ssl_certificate /etc/letsencrypt/live/craftyap.com/fullchain.pem; # managed by Certbot
    ssl_certificate_key /etc/letsencrypt/live/craftyap.com/privkey.pem; # managed by Certbot
    ssl_protocols TLSv1.2 TLSv1.3;

    # canonical host: www → apex
    if ($host = www.craftyap.com) {
        return 301 https://craftyap.com$request_uri;
    }

    access_log /srv/craftyap/logs/nginx-access.log;
    error_log /srv/craftyap/logs/nginx-error.log;

    client_max_body_size 2m;

    gzip on;
    gzip_vary on;
    gzip_comp_level 5;
    gzip_min_length 512;
    gzip_types text/plain text/css application/javascript application/json application/wasm image/svg+xml;

    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Strict-Transport-Security "max-age=31536000" always;

    # Daily-tower realtime socket — long-lived WebSocket upgrade.
    location = /ws {
        proxy_pass http://127.0.0.1:8082;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        # idle sockets survive between server heartbeats (10s pings)
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
    }

    # Everything else (index.html, hashed JS, textures, audio, wasm) is served
    # by the Node app itself (SERVE_STATIC=1), including SPA fallback.
    location / {
        proxy_pass http://127.0.0.1:8082;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }
}
