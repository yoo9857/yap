<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>점프맵 오비 — 타워를 올라라!</title>
<style>
  html, body { margin: 0; padding: 0; height: 100%; overflow: hidden; background: #7ec8f0; }
  canvas { display: block; touch-action: none; }
</style>
</head>
<body>
<canvas id="game"></canvas>
<script>
'use strict';

// ============================================================
//  점프맵 오비 — 로블록스 스타일 2.5D 타워 점프맵 (single file)
//  3D parts rendered in oblique projection (side view)
// ============================================================

const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');

let W = 0, H = 0, DPR = 1, SCALE = 1;
function resize() {
  DPR = Math.min(window.devicePixelRatio || 1, 2);
  W = window.innerWidth; H = window.innerHeight;
  canvas.width = W * DPR; canvas.height = H * DPR;
  canvas.style.width = W + 'px'; canvas.style.height = H + 'px';
  SCALE = Math.min(W / 980, H / 720);
  if (SCALE < 0.45) SCALE = 0.45;
}
window.addEventListener('resize', resize);
resize();

// ---------- deterministic RNG (level is always the same) ----------
function mulberry32(seed) {
  return function () {
    seed |= 0; seed = (seed + 0x6D2B79F5) | 0;
    let t = Math.imul(seed ^ (seed >>> 15), 1 | seed);
    t = (t + Math.imul(t ^ (t >>> 7), 61 | t)) ^ t;
    return ((t ^ (t >>> 14)) >>> 0) / 4294967296;
  };
}

// ---------- constants ----------
const WORLD_W = 960;
const GRAVITY = 2500;
const MOVE_SPEED = 275;
const JUMP_VEL = 800;
const MAX_FALL = 1300;
const COYOTE = 0.10;
const JUMP_BUFFER = 0.12;

// oblique projection: depth axis goes up-right (like a 3/4 camera)
const KX = 0.52, KY = -0.38;
const PLAT_H = 22, PLAT_D = 30;

// classic obby rainbow brick colors (Tower of Hell style)
const BRICK_COLORS = ['#e2231a', '#f5802b', '#f9d71c', '#4bb54a', '#00a2ac', '#0f6cbd', '#7b4fd0', '#e5418f'];

// ---------- level generation ----------
const platforms = [];
const checkpoints = []; // {x, y, idx, active}
let goal = null;
let TOP_Y = 0;

(function buildLevel() {
  const rand = mulberry32(20260717);
  const R = (a, b) => a + rand() * (b - a);

  // green baseplate
  platforms.push({ x: WORLD_W / 2, y: 40, w: WORLD_W + 200, type: 'solid', ground: true, color: '#3ea33b' });

  const sections = [
    { count: 9,  types: ['solid'], hazard: 0 },
    { count: 9,  types: ['solid', 'move', 'solid'], hazard: 0 },
    { count: 9,  types: ['crumble', 'solid', 'crumble'], hazard: 0.3 },
    { count: 11, types: ['move', 'crumble', 'solid', 'move'], hazard: 0.4 },
  ];

  let x = WORLD_W / 2, y = 40;
  let cpIdx = 0, brickIdx = 0;

  for (const sec of sections) {
    for (let i = 0; i < sec.count; i++) {
      const dy = R(78, 102);
      y -= dy;
      const dxMax = Math.max(120, 245 - dy);
      const dir = (x < 180) ? 1 : (x > WORLD_W - 180) ? -1 : (rand() < 0.5 ? -1 : 1);
      x = Math.max(110, Math.min(WORLD_W - 110, x + dir * R(110, dxMax)));
      const type = sec.types[(rand() * sec.types.length) | 0];
      const p = { x, y, w: R(105, 150), type, color: BRICK_COLORS[(brickIdx / 3 | 0) % BRICK_COLORS.length] };
      brickIdx++;
      if (type === 'move') {
        p.baseX = x;
        p.amp = R(60, 105);
        p.speed = R(1.1, 1.8);
        p.phase = rand() * Math.PI * 2;
        p.w = R(95, 120);
      }
      if (type === 'crumble') {
        p.w = R(95, 125);
        p.state = 0; p.timer = 0;
      }
      // kill brick sitting on one edge of wide solid platforms
      if (type === 'solid' && p.w >= 125 && rand() < sec.hazard) {
        p.hazard = { side: rand() < 0.5 ? -1 : 1, w: 32, h: 26 };
      }
      platforms.push(p);
    }
    // checkpoint pad between sections
    y -= R(85, 95);
    x = Math.max(160, Math.min(WORLD_W - 160, x + (rand() < 0.5 ? -1 : 1) * R(100, 150)));
    const cp = { x, y, w: 190, type: 'solid', checkpoint: cpIdx, color: '#b8bcc2' };
    platforms.push(cp);
    checkpoints.push({ x, y, idx: cpIdx, active: false });
    cpIdx++;
  }

  // summit = winner's pad, not a checkpoint
  const last = checkpoints[checkpoints.length - 1];
  checkpoints.pop();
  const summit = platforms[platforms.length - 1];
  summit.checkpoint = undefined;
  summit.w = 240;
  summit.color = '#ffd21c';
  summit.winner = true;
  goal = { x: last.x, y: last.y, t: 0 };
  TOP_Y = last.y;
})();

const CLIMB_TOTAL = 40 - TOP_Y;
const TOTAL_STAGES = checkpoints.length + 1;

// ---------- scenery (clouds + floating islands) ----------
const clouds = [];
const islands = [];
(function buildScenery() {
  const rand = mulberry32(777);
  const R = (a, b) => a + rand() * (b - a);
  const yMin = TOP_Y - 700, yMax = 350;
  for (let i = 0; i < 42; i++) {
    clouds.push({
      x: R(-600, WORLD_W + 600), y: R(yMin, yMax),
      s: R(0.6, 1.6), sp: R(4, 14), px: R(0.15, 0.5),
    });
  }
  for (let i = 0; i < 12; i++) {
    islands.push({
      x: R(-500, WORLD_W + 500), y: R(yMin, yMax - 200),
      w: R(140, 320), px: R(0.25, 0.55),
      color: BRICK_COLORS[(rand() * BRICK_COLORS.length) | 0],
    });
  }
})();

// ---------- audio (tiny WebAudio blips) ----------
let AC = null;
function audio() {
  if (!AC) { try { AC = new (window.AudioContext || window.webkitAudioContext)(); } catch (e) {} }
  if (AC && AC.state === 'suspended') AC.resume();
  return AC;
}
function beep(freq, dur, type, vol, slide) {
  const ac = audio(); if (!ac) return;
  const o = ac.createOscillator(), g = ac.createGain();
  o.type = type || 'sine'; o.frequency.value = freq;
  if (slide) o.frequency.exponentialRampToValueAtTime(slide, ac.currentTime + dur);
  g.gain.setValueAtTime(vol || 0.12, ac.currentTime);
  g.gain.exponentialRampToValueAtTime(0.0001, ac.currentTime + dur);
  o.connect(g).connect(ac.destination);
  o.start(); o.stop(ac.currentTime + dur);
}
const sfx = {
  jump: () => beep(300, 0.16, 'square', 0.05, 560),
  land: () => beep(150, 0.08, 'triangle', 0.06, 90),
  crumble: () => beep(120, 0.25, 'sawtooth', 0.05, 55),
  checkpoint: () => { beep(660, 0.12, 'square', 0.07); setTimeout(() => beep(990, 0.2, 'square', 0.07), 100); },
  oof: () => { beep(380, 0.09, 'sawtooth', 0.14, 250); setTimeout(() => beep(230, 0.14, 'sawtooth', 0.12, 110), 70); },
  clear: () => { [523, 659, 784, 1046, 784, 1046, 1318].forEach((f, i) => setTimeout(() => beep(f, 0.3, 'square', 0.07), i * 120)); },
};

// ---------- input ----------
const keys = {};
let jumpPressedAt = -9;
window.addEventListener('keydown', (e) => {
  if (['ArrowLeft', 'ArrowRight', 'ArrowUp', 'ArrowDown', 'Space'].includes(e.code)) e.preventDefault();
  if (!keys[e.code] && (e.code === 'Space' || e.code === 'ArrowUp' || e.code === 'KeyW')) jumpPressedAt = gameTime;
  keys[e.code] = true;
  if (state === 'title') startGame();
  else if (state === 'clear' && e.code === 'KeyR') restart();
  else if (state === 'play' && e.code === 'KeyR' && !player.dead) respawnAt(spawn); // 체크포인트로 귀환
});
window.addEventListener('keyup', (e) => { keys[e.code] = false; });

const IS_TOUCH = ('ontouchstart' in window) || navigator.maxTouchPoints > 0;
const touchState = { left: false, right: false, jump: false, reset: false };
function touchButtons() {
  const s = Math.min(W, H) * 0.10 + 26;
  return [
    { id: 'left',  x: s * 0.9,      y: H - s * 0.9, r: s * 0.62, label: '◀' },
    { id: 'right', x: s * 2.35,     y: H - s * 0.9, r: s * 0.62, label: '▶' },
    { id: 'jump',  x: W - s * 0.95, y: H - s * 0.9, r: s * 0.72, label: '▲' },
    { id: 'reset', x: W - 40,       y: 40,          r: 26,       label: '↺' },
  ];
}
function handleTouches(e) {
  e.preventDefault();
  const prevJump = touchState.jump;
  touchState.left = touchState.right = touchState.jump = touchState.reset = false;
  for (const t of e.touches) {
    for (const b of touchButtons()) {
      const dx = t.clientX - b.x, dy = t.clientY - b.y;
      if (dx * dx + dy * dy < b.r * b.r * 2.2) touchState[b.id] = true;
    }
  }
  if (touchState.jump && !prevJump) jumpPressedAt = gameTime;
  if (touchState.reset && e.type === 'touchstart' && state === 'play' && !player.dead) respawnAt(spawn);
  if (state === 'title') startGame();
  else if (state === 'clear' && e.type === 'touchstart') restart();
}
canvas.addEventListener('touchstart', handleTouches, { passive: false });
canvas.addEventListener('touchmove', handleTouches, { passive: false });
canvas.addEventListener('touchend', handleTouches, { passive: false });
canvas.addEventListener('mousedown', () => {
  if (state === 'title') startGame();
  else if (state === 'clear') restart();
});

// ---------- player (R6 noob) ----------
const player = {
  x: WORLD_W / 2, y: 40 - 20, vx: 0, vy: 0,
  w: 26, h: 40,
  grounded: false, groundedAt: -9,
  onPlatform: null,
  face: 1,
  limbPhase: 0,
  dead: false, deadTimer: 0,
  lastStoodY: 40,
};

let spawn = { x: WORLD_W / 2, y: 40 };
let particles = [];
let state = 'title'; // title | play | clear
let gameTime = 0;
let runTime = 0;
let falls = 0, deaths = 0;
let bestY = 40;
let clearTime = 0;
let camX = WORLD_W / 2, camY = -100;
let fade = 0;

function startGame() { state = 'play'; runTime = 0; }
function restart() {
  for (const p of platforms) if (p.type === 'crumble') { p.state = 0; p.timer = 0; }
  for (const c of checkpoints) c.active = false;
  spawn = { x: WORLD_W / 2, y: 40 };
  respawnAt(spawn);
  falls = 0; deaths = 0; runTime = 0; bestY = 40;
  state = 'play';
}
function respawnAt(sp) {
  player.x = sp.x; player.y = sp.y - player.h / 2 - 2;
  player.vx = 0; player.vy = 0;
  player.grounded = false; player.onPlatform = null;
  player.lastStoodY = sp.y;
  player.dead = false;
  fade = 1;
}

function spawnParticles(x, y, n, color, spread, up) {
  for (let i = 0; i < n; i++) {
    particles.push({
      x, y,
      vx: (Math.random() - 0.5) * spread,
      vy: up ? -Math.random() * spread * 0.8 : (Math.random() - 0.5) * spread * 0.5,
      life: 0.5 + Math.random() * 0.5, max: 1,
      r: 1.5 + Math.random() * 3, color,
    });
  }
}
// blocky part-explosion (death) / confetti
function spawnBlocks(x, y, parts, spread) {
  for (const c of parts) {
    particles.push({
      x: x + (Math.random() - 0.5) * 20, y: y + (Math.random() - 0.5) * 30,
      vx: (Math.random() - 0.5) * spread, vy: -Math.random() * spread * 0.9,
      life: 0.9 + Math.random() * 0.6, max: 1.4,
      rect: true, rw: 6 + Math.random() * 10, rh: 6 + Math.random() * 10,
      rot: Math.random() * 6.28, vr: (Math.random() - 0.5) * 12,
      color: c,
    });
  }
}

function die() {
  if (player.dead) return;
  player.dead = true;
  player.deadTimer = 1.0;
  deaths++;
  sfx.oof();
  // R6 parts fly everywhere
  spawnBlocks(player.x, player.y, ['#f9d71c', '#f9d71c', '#f9d71c', '#0f6cbd', '#0f6cbd', '#4bb54a', '#4bb54a', '#f9d71c'], 420);
}

// ---------- physics ----------
function movingPlatX(p, t) {
  return p.baseX + Math.sin(t * p.speed + p.phase) * p.amp;
}
function hazardRect(p) {
  const half = p.w / 2, hz = p.hazard;
  const x0 = hz.side < 0 ? p.x - half : p.x + half - hz.w;
  return { x0, x1: x0 + hz.w, y0: p.y - hz.h, y1: p.y };
}

function update(dt) {
  gameTime += dt;
  if (state !== 'play') { updateAmbient(dt); return; }
  runTime += dt;

  // platforms tick
  for (const p of platforms) {
    if (p.type === 'move') {
      const nx = movingPlatX(p, gameTime);
      p.dx = nx - p.x; p.x = nx;
    } else p.dx = 0;
    if (p.type === 'crumble') {
      if (p.state === 1) {
        p.timer -= dt;
        if (p.timer <= 0) { p.state = 2; p.timer = 3.0; spawnBlocks(p.x, p.y + 8, [p.color, p.color, '#8a5a2b', '#8a5a2b'], 200); }
      } else if (p.state === 2) {
        p.timer -= dt;
        if (p.timer <= 0) p.state = 0;
      }
    }
  }

  // dead: wait then respawn
  if (player.dead) {
    player.deadTimer -= dt;
    if (player.deadTimer <= 0) respawnAt(spawn);
    updateAmbient(dt);
    return;
  }

  // input
  const left = keys['ArrowLeft'] || keys['KeyA'] || touchState.left;
  const right = keys['ArrowRight'] || keys['KeyD'] || touchState.right;
  const jumpHeld = keys['Space'] || keys['ArrowUp'] || keys['KeyW'] || touchState.jump;
  const down = keys['ArrowDown'] || keys['KeyS'];

  const target = (right ? 1 : 0) - (left ? 1 : 0);
  const accel = player.grounded ? 3400 : 2100;
  player.vx += (target * MOVE_SPEED - player.vx) * Math.min(1, accel * dt / MOVE_SPEED);
  if (target !== 0) player.face = target;
  if (player.grounded) player.limbPhase += Math.abs(player.vx) * dt * 0.045;

  // ride moving platform
  if (player.grounded && player.onPlatform && player.onPlatform.dx) {
    player.x += player.onPlatform.dx;
  }

  // jump (buffer + coyote)
  const canJump = player.grounded || (gameTime - player.groundedAt < COYOTE);
  if (canJump && gameTime - jumpPressedAt < JUMP_BUFFER) {
    if (down && player.onPlatform && !player.onPlatform.ground) {
      player.y += 6;
      player.vy = 150;
      player.dropFrom = player.onPlatform;
      player.dropUntil = gameTime + 0.25;
    } else {
      player.vy = -JUMP_VEL;
      sfx.jump();
      spawnParticles(player.x, player.y + player.h / 2, 6, '#ffffff', 120, false);
    }
    player.grounded = false; player.onPlatform = null;
    jumpPressedAt = -9;
  }
  if (!jumpHeld && player.vy < -260) player.vy = -260;

  // gravity
  player.vy += GRAVITY * dt;
  if (player.vy > MAX_FALL) player.vy = MAX_FALL;

  const prevBottom = player.y + player.h / 2;
  player.x += player.vx * dt;
  player.y += player.vy * dt;

  // world walls
  const hw = player.w / 2;
  if (player.x < hw) { player.x = hw; player.vx = 0; }
  if (player.x > WORLD_W - hw) { player.x = WORLD_W - hw; player.vx = 0; }

  // one-way platform collision
  player.grounded = false;
  const bottom = player.y + player.h / 2;
  if (player.vy >= 0) {
    for (const p of platforms) {
      if (p.type === 'crumble' && p.state === 2) continue;
      if (player.dropUntil && gameTime < player.dropUntil && p === player.dropFrom) continue;
      const half = p.w / 2;
      if (player.x + hw * 0.6 < p.x - half || player.x - hw * 0.6 > p.x + half) continue;
      if (prevBottom <= p.y + 1 && bottom >= p.y) {
        player.y = p.y - player.h / 2;
        if (player.vy > 500) { sfx.land(); spawnParticles(player.x, p.y, 8, '#ffffff', 150, false); }
        player.vy = 0;
        player.grounded = true;
        player.groundedAt = gameTime;
        player.onPlatform = p;

        if (p.y > player.lastStoodY + 320) { falls++; }
        player.lastStoodY = Math.min(player.lastStoodY, p.y);
        if (p.y < bestY) bestY = p.y;

        if (p.type === 'crumble' && p.state === 0) { p.state = 1; p.timer = 0.55; sfx.crumble(); }

        if (p.checkpoint !== undefined) {
          const cp = checkpoints[p.checkpoint];
          if (cp && !cp.active) {
            cp.active = true;
            spawn = { x: cp.x, y: cp.y };
            sfx.checkpoint();
            spawnBlocks(cp.x, cp.y - 20, ['#3adb76', '#3adb76', '#ffffff', '#3adb76'], 260);
          }
        }
        break;
      }
    }
  }

  // kill bricks
  for (const p of platforms) {
    if (!p.hazard) continue;
    if (Math.abs(p.y - player.y) > 120) continue;
    const r = hazardRect(p);
    if (player.x + hw * 0.7 > r.x0 && player.x - hw * 0.7 < r.x1 &&
        player.y + player.h / 2 > r.y0 && player.y - player.h / 2 < r.y1) {
      die();
      break;
    }
  }

  // safety net
  if (player.y > 400) {
    falls++;
    respawnAt(spawn);
  }

  // winner's pad
  if (goal && !player.dead && Math.abs(player.x - goal.x) < 70 && Math.abs(player.y - (goal.y - 55)) < 80) {
    state = 'clear';
    clearTime = runTime;
    sfx.clear();
  }

  // camera
  const targetCamY = player.y - 60;
  camY += (targetCamY - camY) * Math.min(1, 6 * dt);
  const viewW = W / SCALE;
  let tx = player.x;
  const minCX = Math.min(viewW / 2, WORLD_W / 2);
  tx = Math.max(minCX, Math.min(WORLD_W - minCX, tx));
  if (viewW >= WORLD_W) tx = WORLD_W / 2;
  camX += (tx - camX) * Math.min(1, 8 * dt);

  if (fade > 0) fade -= dt * 2;
  updateAmbient(dt);
}

function updateAmbient(dt) {
  for (let i = particles.length - 1; i >= 0; i--) {
    const pt = particles[i];
    pt.life -= dt;
    if (pt.life <= 0) { particles.splice(i, 1); continue; }
    pt.x += pt.vx * dt; pt.y += pt.vy * dt;
    pt.vy += (pt.noG ? 15 : pt.rect ? 620 : 300) * dt;
    if (pt.rot !== undefined) pt.rot += pt.vr * dt;
  }
  if (goal) goal.t += dt;

  // lava embers rising from kill bricks
  if (state === 'play') {
    for (const p of platforms) {
      if (!p.hazard) continue;
      if (Math.abs(p.y - camY) > H / SCALE * 0.6) continue;
      if (Math.random() < 0.10) {
        const r = hazardRect(p);
        particles.push({
          x: r.x0 + Math.random() * (r.x1 - r.x0), y: r.y0 + 2,
          vx: (Math.random() - 0.5) * 24, vy: -45 - Math.random() * 55,
          life: 0.6 + Math.random() * 0.5, max: 1.1,
          r: 1.4 + Math.random() * 2, color: Math.random() < 0.5 ? '#ff7a30' : '#ffc93d', noG: true,
        });
      }
    }
  }

  // confetti while on winner screen
  if (state === 'clear' && Math.random() < 0.5) {
    particles.push({
      x: camX + (Math.random() - 0.5) * W / SCALE,
      y: camY - H / SCALE / 2 - 20,
      vx: (Math.random() - 0.5) * 60, vy: 60 + Math.random() * 120,
      life: 3, max: 3,
      rect: true, rw: 5 + Math.random() * 6, rh: 4 + Math.random() * 5,
      rot: Math.random() * 6.28, vr: (Math.random() - 0.5) * 10,
      color: BRICK_COLORS[(Math.random() * BRICK_COLORS.length) | 0],
      noG: true,
    });
  }
}

// ============================================================
//  RENDERING — 2.5D (3D parts in oblique projection)
// ============================================================

// draws a 3D box: front face at (x0,y0,w,h), extruded d along the depth axis
function drawBox3D(x0, y0, w, h, d, color, noOutline) {
  const ox = d * KX, oy = d * KY;
  // side face (depth side)
  ctx.fillStyle = shade(color, 0.62);
  ctx.beginPath();
  ctx.moveTo(x0 + w, y0);
  ctx.lineTo(x0 + w + ox, y0 + oy);
  ctx.lineTo(x0 + w + ox, y0 + h + oy);
  ctx.lineTo(x0 + w, y0 + h);
  ctx.closePath();
  ctx.fill();
  // top face (lit from above)
  ctx.fillStyle = shade(color, 1.24);
  ctx.beginPath();
  ctx.moveTo(x0, y0);
  ctx.lineTo(x0 + ox, y0 + oy);
  ctx.lineTo(x0 + w + ox, y0 + oy);
  ctx.lineTo(x0 + w, y0);
  ctx.closePath();
  ctx.fill();
  // front face with vertical light falloff
  const fg = ctx.createLinearGradient(0, y0, 0, y0 + h);
  fg.addColorStop(0, shade(color, 1.04));
  fg.addColorStop(1, shade(color, 0.78));
  ctx.fillStyle = fg;
  ctx.fillRect(x0, y0, w, h);
  // ambient occlusion under the top edge
  ctx.fillStyle = 'rgba(0,0,0,0.10)';
  ctx.fillRect(x0, y0, w, 2);

  if (!noOutline) {
    ctx.strokeStyle = 'rgba(12,18,28,0.55)';
    ctx.lineWidth = 1.5;
    ctx.strokeRect(x0, y0, w, h);
    ctx.beginPath();
    ctx.moveTo(x0, y0); ctx.lineTo(x0 + ox, y0 + oy);
    ctx.lineTo(x0 + w + ox, y0 + oy); ctx.lineTo(x0 + w, y0);
    ctx.moveTo(x0 + w + ox, y0 + oy); ctx.lineTo(x0 + w + ox, y0 + h + oy);
    ctx.lineTo(x0 + w, y0 + h);
    ctx.stroke();
  }
}

// cylindrical studs sitting on a box's top face
function drawStudsTop(x0, y0, w, d, color, gap) {
  gap = gap || 24;
  const rows = d > 24 ? 2 : 1;
  const n = Math.max(1, Math.floor((w - 16) / gap));
  const startX = x0 + w / 2 - ((n - 1) * gap) / 2;
  const sw = 6.4, sh = 2.8, tall = 4;
  for (let r = rows - 1; r >= 0; r--) { // far row first
    const fr = (r + 0.55) / rows;
    const ox = d * KX * fr, oy = d * KY * fr;
    for (let i = 0; i < n; i++) {
      const sx = startX + i * gap + ox, sy = y0 + oy;
      // cylinder wall
      ctx.fillStyle = shade(color, 0.88);
      ctx.beginPath();
      ctx.ellipse(sx, sy, sw, sh, 0, 0, Math.PI);
      ctx.fill();
      ctx.fillRect(sx - sw, sy - tall, sw * 2, tall);
      // top cap
      ctx.fillStyle = shade(color, 1.42);
      ctx.beginPath();
      ctx.ellipse(sx, sy - tall, sw, sh, 0, 0, 7);
      ctx.fill();
      // cap rim
      ctx.strokeStyle = 'rgba(0,0,0,0.18)';
      ctx.lineWidth = 0.8;
      ctx.beginPath();
      ctx.ellipse(sx, sy - tall, sw, sh, 0, 0, 7);
      ctx.stroke();
    }
  }
}

// contact shadow cast straight down onto the first surface below
function drawShadow() {
  const feet = player.y + player.h / 2;
  let gy = null;
  for (const p of platforms) {
    if (p.type === 'crumble' && p.state === 2) continue;
    const half = p.w / 2;
    if (player.x < p.x - half - 6 || player.x > p.x + half + 6) continue;
    if (p.y >= feet - 2 && (gy === null || p.y < gy)) gy = p.y;
  }
  if (gy === null) return;
  const dist = gy - feet;
  const a = Math.max(0.05, 0.30 - dist * 0.0007);
  const r = Math.max(9, 17 - dist * 0.012);
  ctx.fillStyle = `rgba(10,20,32,${a})`;
  ctx.beginPath();
  ctx.ellipse(player.x + PLAT_D * KX * 0.45, gy + PLAT_D * KY * 0.45, r * 1.5, r * 0.42, 0, 0, 7);
  ctx.fill();
}

function draw() {
  ctx.setTransform(DPR, 0, 0, DPR, 0, 0);

  // --- Roblox sky ---
  const depth = Math.max(0, Math.min(1, (40 - camY) / CLIMB_TOTAL));
  const g = ctx.createLinearGradient(0, 0, 0, H);
  g.addColorStop(0, lerpColor('#5fb3ef', '#2f7fe0', depth));
  g.addColorStop(0.75, lerpColor('#a5d9f8', '#7ab7f0', depth));
  g.addColorStop(1, lerpColor('#d8effc', '#b0d6f7', depth));
  ctx.fillStyle = g;
  ctx.fillRect(0, 0, W, H);

  // sun with halo
  const sunX = W * 0.8, sunY = H * 0.15;
  const sg = ctx.createRadialGradient(sunX, sunY, 5, sunX, sunY, 160);
  sg.addColorStop(0, 'rgba(255,252,225,1)');
  sg.addColorStop(0.18, 'rgba(255,246,190,0.9)');
  sg.addColorStop(0.4, 'rgba(255,240,170,0.35)');
  sg.addColorStop(1, 'rgba(255,240,170,0)');
  ctx.fillStyle = sg;
  ctx.fillRect(sunX - 170, sunY - 170, 340, 340);

  // clouds + floating brick islands (parallax)
  for (const c of clouds) {
    const cx = W / 2 + (c.x + gameTime * c.sp - camX) * c.px * SCALE + (c.x - WORLD_W / 2) * (1 - c.px) * SCALE * 0.35;
    const cy = H / 2 + (c.y - camY) * c.px * SCALE;
    if (cx < -260 || cx > W + 260 || cy < -160 || cy > H + 160) continue;
    drawCloud(cx, cy, c.s * SCALE);
  }
  for (const isl of islands) {
    const ix = W / 2 + (isl.x - camX) * isl.px * SCALE + (isl.x - WORLD_W / 2) * (1 - isl.px) * SCALE * 0.35;
    const iy = H / 2 + (isl.y - camY) * isl.px * SCALE;
    if (ix < -400 || ix > W + 400 || iy < -240 || iy > H + 240) continue;
    drawIsland(ix, iy, isl.w * isl.px * SCALE, isl.color);
  }

  // --- world ---
  ctx.save();
  ctx.translate(W / 2, H / 2);
  ctx.scale(SCALE, SCALE);
  ctx.translate(-camX, -camY);

  for (const p of platforms) {
    if (Math.abs(p.y - camY) > H / SCALE * 0.75 + 160) continue;
    drawBrick(p);
  }
  for (const cp of checkpoints) {
    if (Math.abs(cp.y - camY) > H / SCALE) continue;
    drawCheckpointPad(cp);
  }
  if (goal) drawWinnerPad(goal);

  // particles
  for (const pt of particles) {
    ctx.globalAlpha = Math.max(0, Math.min(1, pt.life / pt.max));
    ctx.fillStyle = pt.color;
    if (pt.rect) {
      ctx.save();
      ctx.translate(pt.x, pt.y);
      ctx.rotate(pt.rot);
      ctx.fillRect(-pt.rw / 2, -pt.rh / 2, pt.rw, pt.rh);
      ctx.strokeStyle = 'rgba(0,0,0,0.25)';
      ctx.lineWidth = 1;
      ctx.strokeRect(-pt.rw / 2, -pt.rh / 2, pt.rw, pt.rh);
      ctx.restore();
    } else {
      ctx.beginPath(); ctx.arc(pt.x, pt.y, pt.r, 0, 7); ctx.fill();
    }
  }
  ctx.globalAlpha = 1;

  if (!player.dead) { drawShadow(); drawNoob(); }

  ctx.restore(); // end world

  // respawn flash
  if (fade > 0) {
    ctx.fillStyle = `rgba(255,255,255,${fade * 0.45})`;
    ctx.fillRect(0, 0, W, H);
  }

  drawHUD();
  if (IS_TOUCH && state === 'play') drawTouchUI();
  if (state === 'title') drawTitle();
  if (state === 'clear') drawClear();
}

// --- 3D studded brick ---
function drawBrick(p) {
  const half = p.w / 2;
  let shakeX = 0, shakeY = 0;
  const isCr = p.type === 'crumble';
  const isMv = p.type === 'move';
  const bh = p.ground ? 420 : PLAT_H;
  const x0 = p.x - half;

  if (isCr) {
    if (p.state === 2) {
      ctx.globalAlpha = 0.15;
      ctx.strokeStyle = '#444';
      ctx.setLineDash([6, 6]);
      ctx.strokeRect(x0, p.y, p.w, PLAT_H);
      ctx.setLineDash([]);
      ctx.globalAlpha = 1;
      return;
    }
    if (p.state === 1) { shakeX = (Math.random() - 0.5) * 5; shakeY = (Math.random() - 0.5) * 3; }
  }

  ctx.save();
  ctx.translate(shakeX, shakeY);

  if (p.ground) {
    // dirt slab
    drawBox3D(x0, p.y, p.w, bh, PLAT_D + 14, '#8a5a2b');
    // grass: repaint top face + a lip over the front edge
    const d = PLAT_D + 14, ox = d * KX, oy = d * KY;
    ctx.fillStyle = '#5cc94e';
    ctx.beginPath();
    ctx.moveTo(x0, p.y);
    ctx.lineTo(x0 + ox, p.y + oy);
    ctx.lineTo(x0 + p.w + ox, p.y + oy);
    ctx.lineTo(x0 + p.w, p.y);
    ctx.closePath();
    ctx.fill();
    ctx.fillStyle = '#46a83c';
    ctx.fillRect(x0, p.y, p.w, 12);
    ctx.fillStyle = 'rgba(0,0,0,0.12)';
    ctx.fillRect(x0, p.y + 10, p.w, 2);
    drawStudsTop(x0, p.y, p.w, d, '#4fbb45', 34);
    ctx.restore();
    return;
  }

  const base = isCr ? '#a56a35' : (isMv ? '#8f959e' : p.color);
  drawBox3D(x0, p.y, p.w, bh, PLAT_D, base);
  drawStudsTop(x0, p.y, p.w, PLAT_D, base);

  // moving platform: hazard stripes across the front face
  if (isMv) {
    ctx.save();
    ctx.beginPath();
    ctx.rect(x0 + 2, p.y + 7, p.w - 4, 10);
    ctx.clip();
    for (let sx = x0 - 20; sx < x0 + p.w + 20; sx += 18) {
      ctx.fillStyle = ((sx / 18) | 0) % 2 ? '#ffce00' : '#2b2b2b';
      ctx.save();
      ctx.translate(sx, p.y + 12);
      ctx.rotate(-0.5);
      ctx.fillRect(-6, -12, 12, 24);
      ctx.restore();
    }
    ctx.restore();
    ctx.strokeStyle = 'rgba(0,0,0,0.4)';
    ctx.lineWidth = 1;
    ctx.strokeRect(x0 + 2, p.y + 7, p.w - 4, 10);
  }

  // crumble: wooden planks + cracks
  if (isCr) {
    ctx.strokeStyle = 'rgba(70,40,12,0.45)';
    ctx.lineWidth = 1.2;
    ctx.beginPath();
    for (let sx = x0 + 16; sx < x0 + p.w - 6; sx += 22) {
      ctx.moveTo(sx, p.y + 2);
      ctx.lineTo(sx, p.y + PLAT_H - 2);
    }
    ctx.stroke();
    ctx.strokeStyle = 'rgba(55,30,8,0.8)';
    ctx.lineWidth = 1.5;
    ctx.beginPath();
    ctx.moveTo(p.x - half * 0.5, p.y + 4);
    ctx.lineTo(p.x - half * 0.2, p.y + 13);
    ctx.lineTo(p.x + half * 0.1, p.y + 8);
    ctx.lineTo(p.x + half * 0.45, p.y + 18);
    ctx.moveTo(p.x - half * 0.75, p.y + 16);
    ctx.lineTo(p.x - half * 0.55, p.y + 9);
    ctx.stroke();
  }

  // kill brick: glowing red 3D box on the platform
  if (p.hazard) {
    const r = hazardRect(p);
    const pulse = 0.55 + 0.45 * Math.sin(gameTime * 6 + p.x);
    drawBox3D(r.x0, r.y0, r.x1 - r.x0, r.y1 - r.y0, 16, '#c81800');
    // neon inner panel
    ctx.fillStyle = `rgba(255,110,30,${0.30 + pulse * 0.35})`;
    ctx.fillRect(r.x0 + 3, r.y0 + 3, r.x1 - r.x0 - 6, r.y1 - r.y0 - 6);
    // one stud on top
    drawStudsTop(r.x0, r.y0, r.x1 - r.x0, 16, '#e2231a', 26);
    // glow
    ctx.save();
    ctx.globalCompositeOperation = 'lighter';
    const gg = ctx.createRadialGradient((r.x0 + r.x1) / 2, (r.y0 + r.y1) / 2, 2, (r.x0 + r.x1) / 2, (r.y0 + r.y1) / 2, 46);
    gg.addColorStop(0, `rgba(255,80,30,${0.28 * pulse})`);
    gg.addColorStop(1, 'rgba(255,80,30,0)');
    ctx.fillStyle = gg;
    ctx.fillRect(r.x0 - 46, r.y0 - 46, r.x1 - r.x0 + 92, r.y1 - r.y0 + 92);
    ctx.restore();
  }

  ctx.restore();
}

// --- checkpoint: 3D neon cylinder pad + sign post ---
function drawCheckpointPad(cp) {
  const on = cp.active;
  const pulse = 0.5 + 0.5 * Math.sin(gameTime * 3 + cp.idx);
  const px = cp.x, py = cp.y;
  // center the pad on the platform's top face
  const cox = PLAT_D * KX * 0.5, coy = PLAT_D * KY * 0.5;
  const cxp = px + cox, cyp = py + coy;
  const rx = 54, ry = rx * 0.30, padH = 5;
  const base = on ? '#2fd06a' : '#3f9fe8';

  // light beam first (behind the pad)
  ctx.save();
  ctx.globalCompositeOperation = 'lighter';
  const c = on ? '90,240,140' : '110,190,255';
  const bg = ctx.createLinearGradient(0, cyp - 130, 0, cyp);
  bg.addColorStop(0, `rgba(${c},0)`);
  bg.addColorStop(1, `rgba(${c},${0.15 + pulse * 0.10})`);
  ctx.fillStyle = bg;
  ctx.fillRect(cxp - rx + 10, cyp - 130, rx * 2 - 20, 128);
  ctx.restore();

  // cylinder side
  ctx.fillStyle = shade(base, 0.65);
  ctx.beginPath();
  ctx.ellipse(cxp, cyp - padH + 3, rx, ry, 0, 0, Math.PI);
  ctx.fill();
  ctx.fillRect(cxp - rx, cyp - padH - 2, rx * 2, 5);
  // cylinder top
  ctx.fillStyle = shade(base, 1.15);
  ctx.beginPath();
  ctx.ellipse(cxp, cyp - padH - 2, rx, ry, 0, 0, 7);
  ctx.fill();
  // neon ring on top
  ctx.strokeStyle = `rgba(255,255,255,${0.5 + pulse * 0.4})`;
  ctx.lineWidth = 2.5;
  ctx.beginPath();
  ctx.ellipse(cxp, cyp - padH - 2, rx * 0.72, ry * 0.72, 0, 0, 7);
  ctx.stroke();
  ctx.strokeStyle = shade(base, 0.5);
  ctx.lineWidth = 1.5;
  ctx.beginPath();
  ctx.ellipse(cxp, cyp - padH - 2, rx, ry, 0, 0, 7);
  ctx.stroke();

  // sign post (3D)
  const sx = px, sy = py;
  drawBox3D(sx - 2.5, sy - 46, 5, 44, 4, '#9aa2ad', true);
  drawBox3D(sx - 32, sy - 72, 64, 28, 6, on ? '#e8fff0' : '#f4f6f8');
  ctx.font = 'bold 16px system-ui, sans-serif';
  ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
  ctx.fillStyle = on ? '#1d9950' : '#333';
  ctx.fillText(`${cp.idx + 2}단계`, sx, sy - 57);
}

// --- winner's pad: golden 3D cylinder + trophy ---
function drawWinnerPad(gl) {
  const px = gl.x, py = gl.y, t = gl.t;
  const pulse = 0.5 + 0.5 * Math.sin(t * 4);
  const cox = PLAT_D * KX * 0.5, coy = PLAT_D * KY * 0.5;
  const cxp = px + cox, cyp = py + coy;
  const rx = 82, ry = rx * 0.28, padH = 7;

  // golden glow
  ctx.save();
  ctx.globalCompositeOperation = 'lighter';
  const pg = ctx.createRadialGradient(cxp, cyp - 40, 5, cxp, cyp - 40, 140);
  pg.addColorStop(0, `rgba(255,215,60,${0.32 + pulse * 0.15})`);
  pg.addColorStop(1, 'rgba(255,215,60,0)');
  ctx.fillStyle = pg;
  ctx.fillRect(cxp - 140, cyp - 180, 280, 280);
  ctx.restore();

  // cylinder
  ctx.fillStyle = shade('#e8b400', 0.66);
  ctx.beginPath();
  ctx.ellipse(cxp, cyp - padH + 4, rx, ry, 0, 0, Math.PI);
  ctx.fill();
  ctx.fillRect(cxp - rx, cyp - padH - 3, rx * 2, 7);
  ctx.fillStyle = `rgba(255,${205 + pulse * 40 | 0},40,1)`;
  ctx.beginPath();
  ctx.ellipse(cxp, cyp - padH - 3, rx, ry, 0, 0, 7);
  ctx.fill();
  ctx.strokeStyle = '#a87b00';
  ctx.lineWidth = 2;
  ctx.beginPath();
  ctx.ellipse(cxp, cyp - padH - 3, rx, ry, 0, 0, 7);
  ctx.stroke();
  // rotating sparkle dots on the pad rim
  for (let i = 0; i < 6; i++) {
    const a = t * 1.4 + i * Math.PI / 3;
    ctx.fillStyle = `rgba(255,255,255,${0.5 + 0.5 * Math.sin(t * 5 + i)})`;
    ctx.beginPath();
    ctx.arc(cxp + Math.cos(a) * rx * 0.8, cyp - padH - 3 + Math.sin(a) * ry * 0.8, 2.2, 0, 7);
    ctx.fill();
  }

  // trophy
  const ty = cyp - padH - 46 + Math.sin(t * 2) * 4;
  ctx.fillStyle = '#ffcf1c';
  ctx.strokeStyle = '#a87b00';
  ctx.lineWidth = 2;
  ctx.beginPath();
  ctx.moveTo(cxp - 14, ty - 16);
  ctx.quadraticCurveTo(cxp - 15, ty + 4, cxp, ty + 8);
  ctx.quadraticCurveTo(cxp + 15, ty + 4, cxp + 14, ty - 16);
  ctx.closePath();
  ctx.fill(); ctx.stroke();
  ctx.beginPath();
  ctx.arc(cxp - 17, ty - 8, 7, Math.PI * 0.5, Math.PI * 1.6);
  ctx.arc(cxp + 17, ty - 8, 7, Math.PI * 1.4, Math.PI * 0.5);
  ctx.stroke();
  ctx.fillRect(cxp - 4, ty + 8, 8, 6);
  drawBox3D(cxp - 12, ty + 14, 24, 6, 8, '#d6a200', true);
  ctx.font = 'bold 12px sans-serif';
  ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
  ctx.fillStyle = '#a87b00';
  ctx.fillText('★', cxp, ty - 4);

  // sign
  drawBox3D(px - 48, py - 112, 96, 30, 6, '#fff6d8');
  ctx.font = 'bold 16px system-ui, sans-serif';
  ctx.fillStyle = '#c98a00';
  ctx.fillText('🏆 우승 파드', px, py - 96);
}

function drawCloud(x, y, s) {
  // shaded puffy cloud
  ctx.fillStyle = 'rgba(225,238,248,0.9)';
  ctx.beginPath();
  ctx.arc(x, y + 3 * s, 26 * s, 0, 7);
  ctx.arc(x + 30 * s, y + 7 * s, 20 * s, 0, 7);
  ctx.arc(x - 30 * s, y + 8 * s, 18 * s, 0, 7);
  ctx.fill();
  ctx.fillStyle = 'rgba(255,255,255,0.95)';
  ctx.beginPath();
  ctx.arc(x, y, 26 * s, 0, 7);
  ctx.arc(x + 28 * s, y + 4 * s, 19 * s, 0, 7);
  ctx.arc(x - 28 * s, y + 5 * s, 17 * s, 0, 7);
  ctx.arc(x + 10 * s, y - 12 * s, 18 * s, 0, 7);
  ctx.fill();
}

function drawIsland(x, y, w, color) {
  const h = w * 0.26;
  ctx.globalAlpha = 0.9;
  drawBox3D(x - w / 2, y, w, h, w * 0.16, color);
  drawStudsTop(x - w / 2, y, w, w * 0.16, color, Math.max(20, w / 6));
  ctx.globalAlpha = 1;
}

// --- classic R6 noob, 3D parts in side view ---
function drawNoob() {
  const p = player;
  const walking = p.grounded && Math.abs(p.vx) > 30;
  const swing = walking ? Math.sin(p.limbPhase) * 0.65 : 0;
  const airborne = !p.grounded;

  // proportions
  const torsoW = 15, torsoH = 15, torsoD = 8;
  const torsoTop = -6;
  const legW = 6.5, legH = 13;
  const armW = 5.5, armH = 14;
  const headW = 14, headH = 12;

  ctx.save();
  ctx.translate(p.x, p.y);
  ctx.scale(p.face, 1);

  function limb(px, py, w, h, ang, color, d) {
    ctx.save();
    ctx.translate(px, py);
    ctx.rotate(ang);
    drawBox3D(-w / 2, 0, w, h, d, color);
    ctx.restore();
  }

  // far-side limbs (offset along depth axis, darker)
  const fox = torsoD * KX * 0.9, foy = torsoD * KY * 0.9;
  ctx.save();
  ctx.translate(fox, foy);
  limb(-2, torsoTop + 2, armW, armH, airborne ? -2.6 : -swing, '#cfa511', 3.5);
  limb(-3, torsoTop + torsoH, legW, legH, airborne ? 0.45 : -swing, '#37953a', 3.5);
  ctx.restore();

  // torso
  drawBox3D(-torsoW / 2, torsoTop, torsoW, torsoH, torsoD, '#0f6cbd');

  // near-side limbs
  limb(3, torsoTop + torsoH, legW, legH, airborne ? -0.35 : swing, '#4bb54a', 4);
  limb(2, torsoTop + 2, armW, armH, airborne ? -2.9 : swing, '#f9d71c', 4);

  // head
  const hy = torsoTop - headH - 1;
  drawBox3D(-headW / 2, hy, headW, headH, torsoD, '#f9d71c');

  // classic smiley face (front face, looking +x)
  const blink = (Math.sin(gameTime * 0.7) > 0.985) ? 0.3 : 1;
  ctx.fillStyle = '#1a1a1a';
  ctx.beginPath();
  ctx.ellipse(1.0, hy + 5, 1.5, 2.2 * blink, 0, 0, 7);
  ctx.ellipse(5.5, hy + 5, 1.5, 2.2 * blink, 0, 0, 7);
  ctx.fill();
  ctx.strokeStyle = '#1a1a1a';
  ctx.lineWidth = 1.4;
  ctx.lineCap = 'round';
  ctx.beginPath();
  ctx.arc(3.3, hy + 6.5, 3.4, 0.35, Math.PI - 0.5);
  ctx.stroke();

  ctx.restore();

  // username tag (never mirrored)
  ctx.font = '600 10px system-ui, sans-serif';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'bottom';
  ctx.lineWidth = 3;
  ctx.strokeStyle = 'rgba(20,30,45,0.55)';
  ctx.strokeText('Guest1337', p.x, p.y - 24);
  ctx.fillStyle = '#ffffff';
  ctx.fillText('Guest1337', p.x, p.y - 24);
}

function drawHUD() {
  const heightNow = Math.max(0, 40 - Math.min(player.y + player.h / 2, 40));
  const pct = Math.min(100, (heightNow / CLIMB_TOTAL) * 100);
  const stage = checkpoints.filter(c => c.active).length + 1;

  ctx.save();
  ctx.font = '600 14px system-ui, sans-serif';
  ctx.textAlign = 'left';
  ctx.textBaseline = 'top';

  ctx.fillStyle = 'rgba(255,255,255,0.85)';
  roundRect(14, 14, 210, 92, 12);
  ctx.fill();
  ctx.strokeStyle = 'rgba(0,0,0,0.25)';
  ctx.lineWidth = 2;
  roundRect(14, 14, 210, 92, 12);
  ctx.stroke();

  ctx.fillStyle = '#25313f';
  ctx.fillText(`🚩 ${stage}단계 / ${TOTAL_STAGES}단계`, 28, 26);
  ctx.fillText(`⏱ ${fmtTime(state === 'clear' ? clearTime : runTime)}`, 28, 48);
  ctx.fillText(`💀 사망 ${deaths}회 · 낙하 ${falls}회`, 28, 70);

  // progress bar (right edge)
  const barH = Math.min(H * 0.5, 320), barX = W - 26, barY = (H - barH) / 2;
  ctx.fillStyle = 'rgba(255,255,255,0.6)';
  roundRect(barX - 5, barY - 6, 10, barH + 12, 6);
  ctx.fill();
  ctx.fillStyle = '#f5802b';
  const fh = (barH * pct) / 100;
  roundRect(barX - 3, barY + barH - fh, 6, Math.max(4, fh), 3);
  ctx.fill();
  ctx.font = '14px sans-serif';
  ctx.textAlign = 'center';
  ctx.fillStyle = '#c98a00';
  ctx.fillText('🏆', barX, barY - 22);
  ctx.restore();
}

function drawTouchUI() {
  ctx.save();
  for (const b of touchButtons()) {
    ctx.globalAlpha = touchState[b.id] ? 0.65 : 0.35;
    ctx.fillStyle = '#ffffff';
    ctx.beginPath(); ctx.arc(b.x, b.y, b.r, 0, 7); ctx.fill();
    ctx.globalAlpha = 0.9;
    ctx.fillStyle = '#25313f';
    ctx.font = `bold ${b.r * 0.7}px sans-serif`;
    ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
    ctx.fillText(b.label, b.x, b.y + 2);
  }
  ctx.restore();
}

function drawTitle() {
  ctx.save();
  ctx.fillStyle = 'rgba(20,40,70,0.45)';
  ctx.fillRect(0, 0, W, H);
  ctx.textAlign = 'center';

  const cy = H * 0.36;
  const size = Math.min(72, W * 0.09);
  ctx.font = `900 ${size}px system-ui, sans-serif`;
  ctx.save();
  ctx.translate(W / 2, cy);
  ctx.rotate(-0.03);
  ctx.fillStyle = '#b01005';
  ctx.fillText('점프맵 오비!', 5, 6);
  ctx.fillStyle = '#e2231a';
  ctx.fillText('점프맵 오비!', 0, 0);
  ctx.strokeStyle = '#ffffff';
  ctx.lineWidth = Math.max(2, size * 0.04);
  ctx.strokeText('점프맵 오비!', 0, 0);
  ctx.restore();

  ctx.font = `700 ${Math.min(19, W * 0.032)}px system-ui, sans-serif`;
  ctx.fillStyle = '#ffffff';
  ctx.fillText(`${TOTAL_STAGES}단계 타워 꼭대기의 🏆 우승 파드에 도달하라!`, W / 2, cy + 52);

  const blink = 0.5 + 0.5 * Math.sin(gameTime * 3);
  ctx.globalAlpha = 0.4 + blink * 0.6;
  ctx.font = '800 18px system-ui, sans-serif';
  ctx.fillStyle = '#ffe14d';
  ctx.fillText(IS_TOUCH ? '화면을 터치하면 시작' : '아무 키나 누르면 시작', W / 2, H * 0.6);
  ctx.globalAlpha = 1;

  ctx.font = '500 14px system-ui, sans-serif';
  ctx.fillStyle = 'rgba(255,255,255,0.9)';
  const lines = IS_TOUCH
    ? ['◀ ▶ 이동   ·   ▲ 점프   ·   ↺ 체크포인트로 귀환', '빨간 킬 브릭 = 즉사!  ·  파란 패드 = 체크포인트  ·  갈라진 나무 발판은 무너져요']
    : ['← → / A D 이동  ·  Space / ↑ 점프  ·  ↓+점프 아래로  ·  R 체크포인트로 귀환', '빨간 킬 브릭 = 즉사!  ·  파란 패드 = 체크포인트  ·  갈라진 나무 발판은 무너져요'];
  lines.forEach((l, i) => ctx.fillText(l, W / 2, H * 0.6 + 40 + i * 24));
  ctx.restore();
}

function drawClear() {
  ctx.save();
  ctx.fillStyle = 'rgba(20,40,70,0.5)';
  ctx.fillRect(0, 0, W, H);
  ctx.textAlign = 'center';

  const size = Math.min(64, W * 0.085);
  ctx.font = `900 ${size}px system-ui, sans-serif`;
  ctx.save();
  ctx.translate(W / 2, H * 0.36);
  ctx.rotate(-0.02);
  ctx.fillStyle = '#a87b00';
  ctx.fillText('🏆 우승! 🏆', 4, 5);
  ctx.fillStyle = '#ffd21c';
  ctx.fillText('🏆 우승! 🏆', 0, 0);
  ctx.restore();

  ctx.font = '800 22px system-ui, sans-serif';
  ctx.fillStyle = '#ffffff';
  ctx.fillText(`기록  ${fmtTime(clearTime)}`, W / 2, H * 0.47);
  ctx.font = '600 18px system-ui, sans-serif';
  ctx.fillStyle = 'rgba(255,255,255,0.92)';
  ctx.fillText(`사망 ${deaths}회 · 낙하 ${falls}회`, W / 2, H * 0.53);

  const blink = 0.5 + 0.5 * Math.sin(gameTime * 3);
  ctx.globalAlpha = 0.4 + blink * 0.6;
  ctx.font = '700 16px system-ui, sans-serif';
  ctx.fillStyle = '#ffe14d';
  ctx.fillText(IS_TOUCH ? '화면을 터치하면 다시 도전' : 'R 키 또는 클릭으로 다시 도전', W / 2, H * 0.62);
  ctx.restore();
}

// ---------- helpers ----------
function roundRect(x, y, w, h, r) {
  ctx.beginPath();
  ctx.moveTo(x + r, y);
  ctx.arcTo(x + w, y, x + w, y + h, r);
  ctx.arcTo(x + w, y + h, x, y + h, r);
  ctx.arcTo(x, y + h, x, y, r);
  ctx.arcTo(x, y, x + w, y, r);
  ctx.closePath();
}
function fmtTime(t) {
  const m = Math.floor(t / 60), s = Math.floor(t % 60), cs = Math.floor((t % 1) * 100);
  return `${m}:${String(s).padStart(2, '0')}.${String(cs).padStart(2, '0')}`;
}
function lerpColor(a, b, t) {
  const pa = [parseInt(a.slice(1, 3), 16), parseInt(a.slice(3, 5), 16), parseInt(a.slice(5, 7), 16)];
  const pb = [parseInt(b.slice(1, 3), 16), parseInt(b.slice(3, 5), 16), parseInt(b.slice(5, 7), 16)];
  const c = pa.map((v, i) => Math.round(v + (pb[i] - v) * t));
  return `rgb(${c[0]},${c[1]},${c[2]})`;
}
function shade(hex, f) {
  const r = Math.min(255, Math.round(parseInt(hex.slice(1, 3), 16) * f));
  const g = Math.min(255, Math.round(parseInt(hex.slice(3, 5), 16) * f));
  const b = Math.min(255, Math.round(parseInt(hex.slice(5, 7), 16) * f));
  return `rgb(${r},${g},${b})`;
}

// ---------- main loop ----------
let lastT = performance.now();
function frame(now) {
  let dt = (now - lastT) / 1000;
  lastT = now;
  if (dt > 0.05) dt = 0.05;
  update(dt);
  draw();
  requestAnimationFrame(frame);
}
requestAnimationFrame(frame);
</script>
